<script>
const $ = (id) => document.getElementById(id);

let currentCat = "tous";
let agentMsgs = [];

function normalize(str) {
return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function filterAnnonces() {
const search = normalize($("searchInput").value);
const region = normalize($("regionSelect").value);
const ville = normalize($("villeInput").value);
const kmMax = +$("kmSlider").value;

const filtered = ANNONCES.filter(a => {
return (
(currentCat === "tous" || a.cat === currentCat) &&
(!search || normalize(a.titre).includes(search) || normalize(a.ville).includes(search)) &&
(!region || normalize(a.region).includes(region)) &&
(!ville || normalize(a.ville).includes(ville)) &&
(!a.km || a.km <= kmMax)
);
});

renderAnnonces(filtered);
}

function renderAnnonces(list) {
const grid = $("grid");
const count = $("resultsCount");

count.textContent = list.length + " annonce" + (list.length > 1 ? "s" : "");
grid.innerHTML = "";

if (!list.length) {
grid.innerHTML = `<div class="no-results">Aucune annonce</div>`;
return;
}

list.forEach(a => {
const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<div class="card-wrap">
<div class="card-img">${a.icon}</div>
<div class="card-badge ${!a.verified ? 'new' : ''}">
${a.verified ? "✓ Vérifié" : "⚡ Nouveau"}
</div>
</div>
<div class="card-body">
<div class="card-title">${a.titre}</div>
<div class="card-price">${a.prix.toLocaleString("fr-FR")} €</div>
<div class="card-meta">
<span>📍 ${a.ville}</span>
${a.km ? `<span>⏱ ${a.km} km</span>` : ""}
</div>
</div>
`;

card.onclick = () => openModal(a);

grid.appendChild(card);
});
}

function setCat(cat, el) {
currentCat = cat;
document.querySelectorAll(".cat").forEach(c => c.classList.remove("active"));
el.classList.add("active");
filterAnnonces();
}

function updateKm() {
$("kmValue").textContent = $("kmSlider").value + " km";
filterAnnonces();
}

function openModal(a) {
const modal = document.createElement("div");
modal.className = "modal";

modal.innerHTML = `
<div class="modal-content">
<h2>${a.titre}</h2>
<p><strong>${a.prix} €</strong></p>
<p>${a.ville} - ${a.region}</p>
<p>${a.desc}</p>
<button onclick="this.closest('.modal').remove()">Fermer</button>
</div>
`;

document.body.appendChild(modal);
}

/* AGENT */

function addMsg(role, text) {
agentMsgs.push({ role, text });

$("agentMsgs").innerHTML = agentMsgs.map(m => `
<div class="bubble ${m.role}">
${m.text}
</div>
`).join("");

$("agentMsgs").scrollTop = 9999;
}

function openAgent() {
$("agentOverlay").classList.add("open");

if (!agentMsgs.length) {
addMsg("agent", "👋 Bonjour !");
}
}

function sendMsg() {
const inp = $("agentInp");
const txt = inp.value.trim();
if (!txt) return;

addMsg("user", txt);
inp.value = "";
}

/* rendre global (IMPORTANT) */
window.setCat = setCat;
window.updateKm = updateKm;
window.openAgent = openAgent;
window.sendMsg = sendMsg;

/* INIT */
filterAnnonces();
</script>
