<body>

<div class="header">
<img class="logo-h" src="https://i.imgur.com/iLRREdx.png" alt="Le Marché Auto"/>
<button class="agent-btn" onclick="openAgent()">🛡️ Agent Anti-Fraude</button>
</div>

<div class="hero">
<img class="hero-logo" src="https://i.imgur.com/iLRREdx.png" alt="Le Marché Auto"/>
<p>Voitures · Motos · Vélos · Pièces détachées</p>
<div class="soon-badge">🔔 Bientôt disponible !</div>
</div>

<div class="search-box">
<div class="search-row">
<input class="search-input" id="searchInput" placeholder="🔍 Rechercher (ex: Golf, BMW...)" oninput="filterAnnonces()"/>
<button class="search-btn" onclick="filterAnnonces()">Chercher</button>
</div>
<div class="filters-row">
<select class="filter-select" id="regionSelect" onchange="filterAnnonces()">
<option value="">🗺️ Toutes les régions</option>
<option>Île-de-France</option>
<option>Auvergne-Rhône-Alpes</option>
<option>Provence-Alpes-Côte d'Azur</option>
<option>Nouvelle-Aquitaine</option>
<option>Occitanie</option>
<option>Hauts-de-France</option>
<option>Grand Est</option>
<option>Normandie</option>
<option>Bretagne</option>
<option>Pays de la Loire</option>
<option>Bourgogne-Franche-Comté</option>
<option>Centre-Val de Loire</option>
</select>
<input class="filter-select" id="villeInput" placeholder="📍 Ville (ex: Lyon)" oninput="filterAnnonces()"/>
</div>
<div class="km-row">
<span class="km-label">📏 Rayon :</span>
<input type="range" class="km-slider" id="kmSlider" min="5" max="500" value="50" step="5" oninput="updateKm()"/>
<span class="km-value" id="kmValue">50 km</span>
</div>
<button class="location-btn" onclick="getLocation()">
📍 Utiliser ma position automatiquement
</button>
</div>

<div class="cats">
<div class="cat active" onclick="setCat('tous',this)">🔥 Tous</div>
<div class="cat" onclick="setCat('voiture',this)">🚗 Voitures</div>
<div class="cat" onclick="setCat('moto',this)">🏍️ Motos</div>
<div class="cat" onclick="setCat('velo',this)">🚲 Vélos</div>
<div class="cat" onclick="setCat('pieces',this)">🔧 Pièces</div>
</div>

<div class="results-info">
<span class="results-count" id="resultsCount">0 annonce</span>
</div>

<div class="grid" id="grid"></div>

<div class="tab-bar">
<button class="tab active"><span class="tab-icon">🏠</span>Accueil</button>
<button class="tab"><span class="tab-icon">🔍</span>Recherche</button>
<button class="tab" onclick="alert('Publication bientôt disponible !')"><div class="tab-add">+</div><span style="color:#E74C3C;font-weight:700;font-size:10px;">Vendre</span></button>
<button class="tab" onclick="openAgent()"><span class="tab-icon">🛡️</span>Agent</button>
<button class="tab"><span class="tab-icon">👤</span>Profil</button>
</div>

<div class="overlay" id="agentOverlay" onclick="if(event.target===this)closeAgent()">
<div class="agent-panel">
<div class="agent-header">
<div style="display:flex;align-items:center;gap:10px;">
<img src="https://i.imgur.com/iLRREdx.png" style="height:32px;width:32px;border-radius:50%;background:#fff;object-fit:contain;"/>
<div>
<div style="color:#fff;font-weight:800;font-size:14px;">🛡️ Agent Marché Auto</div>
<div style="color:rgba(255,255,255,0.6);font-size:10px;">Anti-fraude · 24h/24</div>
</div>
</div>
<button class="close-x" onclick="closeAgent()">✕</button>
</div>
<div class="msgs" id="agentMsgs"></div>
<div class="typing-ind" id="typingInd" style="display:none">⏳ Agent en train d'écrire...</div>
<div class="suggs">
<button class="sugg" onclick="askQ('Comment vendre ?')">Comment vendre ?</button>
<button class="sugg" onclick="askQ('Paiement sécurisé ?')">Paiement sécurisé ?</button>
<button class="sugg" onclick="askQ('Signaler une fraude ?')">Signaler fraude ?</button>
<button class="sugg" onclick="askQ('Recherche par ville ?')">Recherche par ville ?</button>
<button class="sugg" onclick="askQ('C est gratuit ?')">C'est gratuit ?</button>
</div>
<div class="inp-row">
<input class="msg-inp" id="agentInp" placeholder="Posez votre question..." onkeydown="if(event.key==='Enter')sendMsg()"/>
<button class="send" onclick="sendMsg()">→</button>
</div>
</div>
</div>
