<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Le Marché Auto</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#080808; font-family:'Segoe UI',sans-serif; color:#fff; max-width:480px; margin:0 auto; }
.header { background:#0D0D0D; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #1A1A1A; position:sticky; top:0; z-index:50; }
.logo-h { height:46px; border-radius:50%; object-fit:contain; background:#fff; border:2px solid #C0392B; box-shadow:0 0 15px rgba(192,57,43,0.4); }
.agent-btn { background:linear-gradient(135deg,#C0392B,#E74C3C); border:none; border-radius:20px; padding:8px 14px; color:#fff; font-size:12px; font-weight:700; cursor:pointer; }
.hero { background:linear-gradient(180deg,#1A0000,#080808); padding:20px 16px 16px; text-align:center; }
.hero-logo { height:110px; border-radius:50%; object-fit:contain; background:#fff; border:3px solid #C0392B; box-shadow:0 0 30px rgba(192,57,43,0.5); margin-bottom:12px; }
.hero p { color:#888; font-size:13px; margin-bottom:6px; }
.soon-badge { display:inline-block; background:linear-gradient(135deg,#C0392B,#E74C3C); color:#fff; padding:10px 24px; border-radius:12px; font-size:14px; font-weight:800; margin-bottom:16px; }
.search-box { background:#111; border:1px solid #222; border-radius:16px; padding:14px 16px; margin:0 16px 16px; }
.search-row { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.search-input { flex:1; background:#1A1A1A; border:1px solid #2A2A2A; border-radius:10px; padding:10px 14px; color:#fff; font-size:13px; outline:none; font-family:inherit; }
.search-btn { background:#E74C3C; border:none; border-radius:10px; padding:10px 16px; color:#fff; font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap; }
.filters-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
.filter-select { background:#1A1A1A; border:1px solid #2A2A2A; border-radius:10px; padding:10px 12px; color:#fff; font-size:12px; outline:none; font-family:inherit; cursor:pointer; width:100%; }
.km-row { display:flex; align-items:center; gap:10px; }
.km-label { font-size:12px; color:#888; white-space:nowrap; min-width:90px; }
.km-slider { flex:1; accent-color:#E74C3C; cursor:pointer; height:4px; }
.km-value { font-size:13px; font-weight:700; color:#E74C3C; min-width:60px; text-align:right; }
.location-btn { width:100%; background:#1A1A1A; border:1px solid #C0392B33; border-radius:10px; padding:10px; color:#E74C3C; font-size:12px; font-weight:700; cursor:pointer; margin-top:10px; display:flex; align-items:center; justify-content:center; gap:8px; }
.cats { display:flex; gap:8px; overflow-x:auto; padding:0 16px 14px; scrollbar-width:none; }
.cat { background:#141414; border:1px solid #222; border-radius:20px; padding:7px 14px; color:#777; font-size:12px; font-weight:700; cursor:pointer; white-space:nowrap; transition:all 0.2s; flex-shrink:0; }
.cat.active { background:#C0392B; border-color:#C0392B; color:#fff; }
.results-info { padding:0 16px 10px; display:flex; align-items:center; justify-content:space-between; }
.results-count { font-size:12px; color:#555; font-weight:600; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 16px 100px; }
.card { background:#111; border-radius:14px; overflow:hidden; border:1px solid #1A1A1A; cursor:pointer; }
.card-img { width:100%; height:115px; background:#1A1A1A; display:flex; align-items:center; justify-content:center; font-size:40px; }
.card-body { padding:9px 11px 11px; }
.card-title { color:#fff; font-size:12px; font-weight:700; margin-bottom:3px; line-height:1.3; }
.card-price { color:#E74C3C; font-size:16px; font-weight:900; margin-bottom:4px; }
.card-meta { color:#555; font-size:10px; display:flex; flex-direction:column; gap:2px; }
.card-badge { position:absolute; top:8px; right:8px; background:#27AE60; border-radius:8px; padding:2px 7px; font-size:9px; color:#fff; font-weight:700; }
.card-wrap { position:relative; }
.no-results { text-align:center; padding:40px 20px; color:#555; grid-column:1/-1; }
.tab-bar { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:#0A0A0A; border-top:1px solid #1A1A1A; display:flex; z-index:40; }
.tab { flex:1; padding:9px 0; background:none; border:none; color:#444; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:2px; font-size:10px; font-weight:500; }
.tab.active { color:#E74C3C; font-weight:700; }
.tab-icon { font-size:18px; }
.tab-add { background:#E74C3C; border-radius:12px; width:40px; height:26px; display:flex; align-items:center; justify-content:center; font-size:18px; }
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:100; flex-direction:column; justify-content:flex-end; }
.overlay.open { display:flex; }
.agent-panel { background:#0D0D0D; border-radius:24px 24px 0 0; height:85vh; display:flex; flex-direction:column; border:1px solid #1A1A1A; }
.agent-header { background:linear-gradient(135deg,#C0392B,#8B0000); padding:14px 20px; border-radius:24px 24px 0 0; display:flex; align-items:center; justify-content:space-between; }
.close-x { background:rgba(255,255,255,0.15); border:none; border-radius:50%; width:28px; height:28px; color:#fff; cursor:pointer; font-size:15px; }
.msgs { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:10px; scrollbar-width:none; }
.bubble { max-width:85%; padding:10px 14px; border-radius:16px; font-size:12px; line-height:1.5; white-space:pre-wrap; }
.bubble.agent { align-self:flex-start; background:#141414; border:1px solid #222; color:#fff; border-radius:16px 16px 16px 4px; }
.bubble.user { align-self:flex-end; background:#C0392B; color:#fff; border-radius:16px 16px 4px 16px; }
.bubble-lbl { font-size:9px; color:#E74C3C; font-weight:700; margin-bottom:3px; }
.suggs { display:flex; gap:7px; overflow-x:auto; padding:0 14px 8px; scrollbar-width:none; }
.sugg { background:#141414; border:1px solid #222; border-radius:11px; padding:5px 11px; color:#888; font-size:11px; cursor:pointer; white-space:nowrap; }
.inp-row { padding:10px 14px; border-top:1px solid #1A1A1A; display:flex; gap:8px; }
.msg-inp { flex:1; background:#141414; border:1px solid #222; border-radius:10px; padding:9px 12px; color:#fff; font-size:12px; outline:none; font-family:inherit; }
.send { background:#E74C3C; border:none; border-radius:10px; padding:9px 14px; color:#fff; font-size:12px; font-weight:700; cursor:pointer; }
.typing-ind { color:#E74C3C; font-size:11px; padding:0 14px 6px; }
</style>
</head>
