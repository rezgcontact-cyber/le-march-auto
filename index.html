
<script>
/* 🔥 FIX GLOBAL */

(function(){

// Sécurise si fonctions déjà existantes
if (typeof filterAnnonces !== "function") return;

// Attendre que tout soit chargé
document.addEventListener("DOMContentLoaded", function () {
try {
filterAnnonces();
} catch(e) {
console.log("Init erreur:", e);
}
});

// Rend les fonctions accessibles au HTML (onclick etc)
if (typeof setCat === "function") window.setCat = setCat;
if (typeof updateKm === "function") window.updateKm = updateKm;
if (typeof openAgent === "function") window.openAgent = openAgent;
if (typeof sendMsg === "function") window.sendMsg = sendMsg;

// Sécurise erreurs fréquentes
window.onerror = function(msg, url, line) {
console.log("Erreur JS détectée:", msg, "ligne:", line);
};

// Fix bouton ENTER agent
const agentInput = document.getElementById("agentInp");
if (agentInput) {
agentInput.addEventListener("keypress", function(e){
if (e.key === "Enter") {
e.preventDefault();
if (typeof sendMsg === "function") sendMsg();
}
});
}

})();
</script>
