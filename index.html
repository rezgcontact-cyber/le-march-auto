<script>
const $ = (id) => document.getElementById(id);

const state = {
cat: "tous",
annonces: [],
agentMsgs: []
};

state.annonces = [...ANNONCES];

function normalize(str) {
return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function filterAnnonces() {
const search = normalize($("searchInput").value);
const region = normalize($("regionSelect").value);
const ville = normalize($("villeInput").value);
const kmMax = +$("kmSlider").value;

const filtered = state.annonces.filter(a => {
return (
(state.cat === "tous" || a.cat === state.cat) &&
(!search || normalize(a.titre).includes(search) || normalize(a.ville).includes(search)) &&
(!region || normalize(a.region).includes(region)) &&
(!ville || normalize(a.ville).includes(ville)) &&
(!a.km || a.km <= kmMax)
);
});

renderAnnonces(filtered);
}

function createCard(a) {
const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<div class="card-wrap">
<div class="card-img">${a.icon}</div>
<div class="card-badge ${!a.verified ? 'new' : ''}">
${a.verified ? "✓ Vérifié" : "⚡ Nouveau"}
</div>
</div>
<div class="card-body">
<div class="card-title">${a.titre}</div>
<div class="card-price">${a.prix.toLocaleString("fr-FR")} €</div>
<div class="card-meta">
<span>📍 ${a.ville}</span>
${a.km ? `<span>⏱ ${a.km.toLocaleString()} km</span>` : ""}
<span style="font-size:10px;">${a.region}</span>
</div>
</div>
`;

card.addEventListener("click", () => openModal(a));
return card;
}

function renderAnnonces(list) {
const grid = $("grid");
const count = $("resultsCount");

count.textContent = `${list.length} annonce${list.length > 1 ? "s" : ""}`;
grid.innerHTML = "";

if (!list.length) {
grid.innerHTML = `
<div class="no-results">
<div style="font-size:40px;">🔍</div>
<div>Aucune annonce trouvée</div>
</div>`;
return;
}

const fragment = document.createDocumentFragment();
list.forEach(a => fragment.appendChild(createCard(a)));
grid.appendChild(fragment);
}

function setCat(cat, el) {
state.cat = cat;
document.querySelectorAll(".cat").forEach(c => c.classList.remove("active"));
el.classList.add("active");
filterAnnonces();
}

function updateKm() {
$("kmValue").textContent = $("kmSlider").value + " km";
filterAnnonces();
}

/* 🔥 MODAL (remplace alert) */
function openModal(a) {
const modal = document.createElement("div");
modal.className = "modal";
modal.innerHTML = `
<div class="modal-content">
<h2>${a.titre}</h2>
<p><strong>💰 ${a.prix.toLocaleString()} €</strong></p>
<p>📍 ${a.ville} - ${a.region}</p>
${a.km ? `<p>⏱ ${a.km} km</p>` : ""}
<p>${a.desc}</p>
<button onclick="this.closest('.modal').remove()">Fermer</button>
</div>
`;
document.body.appendChild(modal);
}

/* 💬 AGENT */

function addMsg(role, text) {
state.agentMsgs.push({ role, text });

$("agentMsgs").innerHTML = state.agentMsgs.map(m => `
<div class="bubble ${m.role}">
${m.role === "agent" ? '<div class="bubble-lbl">AGENT</div>' : ""}
${m.text.replace(/\n/g, "<br>")}
</div>
`).join("");

$("agentMsgs").scrollTop = 9999;
}

function openAgent() {
$("agentOverlay").classList.add("open");

if (!state.agentMsgs.length) {
addMsg("agent", "👋 Bonjour ! Je peux vous aider à trouver une voiture 🚗");
}
}

async function sendMsg() {
const inp = $("agentInp");
const txt = inp.value.trim();
if (!txt) return;

addMsg("user", txt);
inp.value = "";
$("typingInd").style.display = "block";

const lower = txt.toLowerCase();

const found = FAQ.find(f => f.q.some(k => lower.includes(k)));

if (found) {
setTimeout(() => {
$("typingInd").style.display = "none";
addMsg("agent", found.r);
}, 600);
return;
}

try {
const res = await fetch("https://votre-api-ici.com/agent", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ message: txt })
});

const data = await res.json();
addMsg("agent", data.response || "Réponse vide.");
} catch {
addMsg("agent", "❌ Erreur serveur.");
}

$("typingInd").style.display = "none";
}

/* INIT */
filterAnnonces();
</script>
